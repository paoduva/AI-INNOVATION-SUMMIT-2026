<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI創新百強趨勢年會｜即時摘要工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap');

  :root {
    --ink: #0f0e0c;
    --paper: #f5f2eb;
    --paper2: #ede9df;
    --accent: #c8401f;
    --accent2: #e8823a;
    --gold: #b8962e;
    --muted: #7a746a;
    --border: #d4cfc4;
    --day1: #1a3a5c;
    --day2: #2d5a3d;
    --tag-mfg: #7b3f2a;
    --tag-svc: #2a5c4a;
    --tag-fin: #2a3f7b;
    --tag-ict: #4a2a7b;
    --tag-startup: #7b2a5c;
    --tag-main: #1a3a5c;
    --success: #2d7a4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Sora', 'Noto Serif TC', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    gap: 16px;
  }
  .header-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    line-height: 1.3;
  }
  .header-title span {
    color: var(--accent2);
    font-size: 11px;
    font-weight: 400;
    display: block;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
  }
  .header-stats {
    display: flex;
    gap: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--paper2);
    flex-shrink: 0;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-size: 20px;
    font-weight: 500;
    color: var(--accent2);
    display: block;
    line-height: 1;
  }

  /* Day tabs */
  .day-tabs {
    display: flex;
    gap: 0;
    background: #1a1917;
    border-top: 1px solid #333;
  }
  .day-tab {
    flex: 1;
    padding: 10px 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-align: center;
    border: none;
    background: transparent;
    color: #888;
    transition: all 0.2s;
    border-bottom: 3px solid transparent;
    font-family: 'Sora', sans-serif;
  }
  .day-tab:hover { color: var(--paper); }
  .day-tab.active.day1 {
    color: #7eb8e8;
    border-bottom-color: #7eb8e8;
    background: rgba(26,58,92,0.3);
  }
  .day-tab.active.day2 {
    color: #7ec89a;
    border-bottom-color: #7ec89a;
    background: rgba(45,90,61,0.3);
  }

  /* Main layout */
  .main {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: calc(100vh - 100px);
  }

  /* Sidebar */
  .sidebar {
    background: var(--paper2);
    border-right: 2px solid var(--border);
    overflow-y: auto;
    max-height: calc(100vh - 100px);
    position: sticky;
    top: 100px;
  }
  .sidebar-section {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-section-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--muted);
    padding: 10px 16px 6px;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  .session-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .session-item:hover { background: rgba(0,0,0,0.05); }
  .session-item.active {
    background: var(--paper);
    border-left-color: var(--accent);
  }
  .session-item.has-summary .session-dot {
    background: var(--success) !important;
  }
  .session-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    margin-top: 5px;
    transition: background 0.2s;
  }
  .session-item-info { flex: 1; min-width: 0; }
  .session-item-time {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .session-item-title {
    font-size: 11px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-item-room {
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Room color tags */
  .room-badge {
    display: inline-block;
    font-size: 8px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    padding: 1px 5px;
    border-radius: 2px;
    letter-spacing: 0.05em;
    margin-right: 4px;
  }
  .room-main { background: rgba(26,58,92,0.15); color: var(--day1); }
  .room-e { background: rgba(123,63,42,0.15); color: var(--tag-mfg); }
  .room-f { background: rgba(42,92,74,0.15); color: var(--tag-svc); }
  .room-g { background: rgba(42,63,123,0.15); color: var(--tag-fin); }

  /* Content panel */
  .content {
    padding: 28px 32px;
    overflow-y: auto;
  }

  .session-header {
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--border);
  }
  .session-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .session-time-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--ink);
    color: var(--paper);
    padding: 3px 10px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }
  .session-track-badge {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 3px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .session-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.4;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .session-speaker {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .session-speaker strong { color: var(--ink); }

  /* Two-column layout for input/output */
  .work-area {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 16px;
  }

  .panel {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--paper2);
    border-bottom: 1.5px solid var(--border);
  }
  .panel-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .panel-body { padding: 16px; }

  textarea {
    width: 100%;
    min-height: 280px;
    border: none;
    outline: none;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    line-height: 1.7;
    color: var(--ink);
    background: transparent;
    resize: vertical;
  }

  .summary-output {
    min-height: 280px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--ink);
  }
  .summary-output.empty {
    color: var(--muted);
    font-style: italic;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }
  .summary-section { margin-bottom: 16px; }
  .summary-section h4 {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .summary-section h4::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .summary-section p, .summary-section ul { 
    font-size: 13px; 
    line-height: 1.8; 
  }
  .summary-section ul { padding-left: 18px; }
  .summary-section li { margin-bottom: 4px; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-family: 'Sora', sans-serif;
    letter-spacing: 0.03em;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: #a33318; }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .btn-outline {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--border);
  }
  .btn-outline:hover { background: var(--paper2); }
  .btn-sm { padding: 5px 12px; font-size: 11px; }
  .btn-success {
    background: var(--success);
    color: white;
  }

  .action-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 16px;
  }
  .action-left { display: flex; gap: 8px; }
  .action-right { display: flex; gap: 8px; align-items: center; }

  /* Loading animation */
  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }
  .loading-dots span {
    width: 5px;
    height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: var(--paper);
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 13px;
    z-index: 1000;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-left: 4px solid var(--success); }
  .toast.error { border-left: 4px solid var(--accent); }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 400px;
    text-align: center;
    color: var(--muted);
    gap: 12px;
  }
  .empty-state-icon { font-size: 48px; opacity: 0.4; }
  .empty-state h3 { font-size: 16px; color: var(--ink); opacity: 0.5; }
  .empty-state p { font-size: 13px; max-width: 280px; line-height: 1.6; }

  /* Save indicator */
  .save-indicator {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .save-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
  }

  /* Export modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--paper);
    border-radius: 8px;
    padding: 28px;
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .modal-export-content {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    line-height: 1.8;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    justify-content: flex-end;
  }

  /* ── Speech / Recording UI ── */
  .rec-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--paper2);
    border-bottom: 1.5px solid var(--border);
    flex-wrap: wrap;
  }
  .rec-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-family: 'Sora', sans-serif;
    letter-spacing: 0.04em;
  }
  .rec-btn-start {
    background: #c8401f;
    color: #fff;
    box-shadow: 0 0 0 0 rgba(200,64,31,0.4);
  }
  .rec-btn-start:hover { background: #a33318; }
  .rec-btn-start.recording {
    background: #a33318;
    animation: pulse-ring 1.4s ease-out infinite;
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(200,64,31,0.5); }
    70%  { box-shadow: 0 0 0 10px rgba(200,64,31,0); }
    100% { box-shadow: 0 0 0 0 rgba(200,64,31,0); }
  }
  .rec-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: currentColor;
    display: inline-block;
  }
  .rec-btn-stop {
    background: var(--ink);
    color: #fff;
  }
  .rec-btn-stop:hover { background: #333; }
  .rec-btn-clear {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--border);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
  }
  .rec-btn-clear:hover { color: var(--ink); border-color: var(--ink); }

  .rec-status {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }
  .rec-status.live { color: #c8401f; font-weight: 600; }
  .rec-timer {
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--ink);
    font-weight: 600;
    min-width: 48px;
  }
  .lang-select {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    background: white;
    color: var(--ink);
    cursor: pointer;
    outline: none;
  }
  .interim-text {
    color: #aaa;
    font-style: italic;
  }

  /* wave animation when recording */
  .wave-bars {
    display: inline-flex;
    align-items: flex-end;
    gap: 2px;
    height: 16px;
  }
  .wave-bars span {
    display: inline-block;
    width: 3px;
    background: #c8401f;
    border-radius: 2px;
    animation: wave 1s ease-in-out infinite;
  }
  .wave-bars span:nth-child(1) { animation-delay: 0s;    height: 6px; }
  .wave-bars span:nth-child(2) { animation-delay: 0.15s; height: 10px; }
  .wave-bars span:nth-child(3) { animation-delay: 0.3s;  height: 14px; }
  .wave-bars span:nth-child(4) { animation-delay: 0.45s; height: 10px; }
  .wave-bars span:nth-child(5) { animation-delay: 0.6s;  height: 6px; }
  @keyframes wave {
    0%, 100% { transform: scaleY(0.5); opacity: 0.6; }
    50%       { transform: scaleY(1.2); opacity: 1; }
  }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { position: static; max-height: 300px; }
    .work-area { grid-template-columns: 1fr; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">
      <span>AI INNOVATION SUMMIT 2026</span>
      AI創新百強趨勢年會｜即時摘要工具
    </div>
    <div class="header-stats">
      <div class="stat-item">
        <span class="stat-num" id="totalSessions">37</span>
        場議程
      </div>
      <div class="stat-item">
        <span class="stat-num" id="completedCount">0</span>
        已摘要
      </div>
      <div class="stat-item">
        <span class="stat-num" id="progressPct">0%</span>
        完成率
      </div>
    </div>
  </div>
  <div class="day-tabs">
    <button class="day-tab day1 active" onclick="switchDay(1)">📅 DAY 1 — 4/22（三）主論壇 + 分組</button>
    <button class="day-tab day2" onclick="switchDay(2)">📅 DAY 2 — 4/23（四）主論壇 + 分組</button>
  </div>
</header>

<div class="main">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content" id="content">
    <div class="empty-state">
      <div class="empty-state-icon">🎤</div>
      <h3>選擇左側議程開始摘要</h3>
      <p>點選任一場議程，輸入演講逐字稿或筆記，AI 將自動整理精華摘要</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <div class="modal-title">📋 匯出所有摘要</div>
    <div class="modal-export-content" id="exportContent"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeExport()">關閉</button>
      <button class="btn btn-primary" onclick="copyExport()">複製全文</button>
    </div>
  </div>
</div>

<script>
const SESSIONS = {
  1: [
    // Main stage
    { id: 'd1-01', time: '09:30–09:35', room: 'main', title: '開場致詞', speaker: '郭奕伶／商周集團執行長' },
    { id: 'd1-02', time: '09:35–09:45', room: 'main', title: '政府觀點｜百工百業大轉骨 打造台灣人工智慧島', speaker: '龔明鑫／經濟部部長' },
    { id: 'd1-03', time: '09:45–09:55', room: 'main', title: '評審觀點｜從加法到乘法，CEO的AI領導力', speaker: '簡立峰／Google前台灣董事總經理' },
    { id: 'd1-04', time: '09:55–10:10', room: 'main', title: '獨家解析｜2026商周「AI創新百強」趨勢報告', speaker: '劉佩修／商周集團創新長' },
    { id: 'd1-05', time: '10:10–10:35', room: 'main', title: 'AI趨勢洞察｜全球工業AI龍頭 — 數位孿生驅動製造與基建新革命', speaker: '張合翕／台灣西門子總裁暨執行長' },
    { id: 'd1-06', time: '10:35–11:15', room: 'main', title: 'AI趨勢洞察｜國際策略大師 — 建構數位生態系，企業AI轉型關鍵策略', speaker: 'Mohan Subramaniam／IMD策略與數位轉型教授' },
    { id: 'd1-07', time: '11:15–11:40', room: 'main', title: 'AI創新百強分享｜製造業鑽石獎得主', speaker: '鴻海集團代表' },
    { id: 'd1-08', time: '11:40–12:05', room: 'main', title: 'AI創新百強分享｜服務業鑽石獎得主 — 用AI懂顧客的心，打造人機協作新模式', speaker: '王獻志／信義房屋數位長' },
    // Room E
    { id: 'd1-09', time: '13:30–13:55', room: 'E', title: '製造業獲獎企業 — AI翻轉傳統製造，打造關燈智慧工廠', speaker: '顏心德／李長榮集團數位信息首席官', track: '製造/研發/人才' },

// State
let currentDay = 1;
let currentSession = null;
let summaries = {};
let notes = {};

// Load from localStorage
try {
  const saved = localStorage.getItem('summit-tool-data');
  if (saved) {
    const data = JSON.parse(saved);
    summaries = data.summaries || {};
    notes = data.notes || {};
  }
} catch(e) {}

function saveData() {
  try {
    localStorage.setItem('summit-tool-data', JSON.stringify({ summaries, notes }));
  } catch(e) {}
  updateStats();
}

function updateStats() {
  const total = Object.values(SESSIONS).flat().length;
  const done = Object.keys(summaries).length;
  document.getElementById('totalSessions').textContent = total;
  document.getElementById('completedCount').textContent = done;
  document.getElementById('progressPct').textContent = Math.round(done/total*100) + '%';
}

function switchDay(day) {
  currentDay = day;
  currentSession = null;
  document.querySelectorAll('.day-tab').forEach((t, i) => {
    t.classList.toggle('active', i+1 === day);
  });
  renderSidebar();
  renderContent();
}

function getRoomLabel(room) {
  if (room === 'main') return { label: '主論壇', cls: 'room-main' };
  if (room === 'E') return { label: 'ROOM E', cls: 'room-e' };
  if (room === 'F') return { label: 'ROOM F', cls: 'room-f' };
  if (room === 'G') return { label: 'ROOM G', cls: 'room-g' };
  return { label: room, cls: '' };
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const sessions = SESSIONS[currentDay];
  
  // Group by room
  const groups = {};
  sessions.forEach(s => {
    const key = s.room;
    if (!groups[key]) groups[key] = [];
    groups[key].push(s);
  });

  const roomOrder = ['main', 'E', 'F', 'G'];
  const roomNames = {
    main: currentDay === 1 ? '主論壇' : '主論壇',
    E: 'ROOM E — ' + (currentDay === 1 ? '製造/研發/人才' : '資通訊/建築/策略'),
    F: 'ROOM F — ' + (currentDay === 1 ? '服務/零售/行銷' : '服務/醫藥/人才'),
    G: 'ROOM G — ' + (currentDay === 1 ? '金融/財管/人才' : '新創'),
  };

  let html = '';
  roomOrder.forEach(room => {
    if (!groups[room]) return;
    const roomInfo = getRoomLabel(room);
    html += `<div class="sidebar-section">
      <div class="sidebar-section-title">${roomNames[room]}</div>`;
    groups[room].forEach(s => {
      const hasSummary = !!summaries[s.id];
      html += `<div class="session-item ${currentSession?.id === s.id ? 'active' : ''} ${hasSummary ? 'has-summary' : ''}" onclick="selectSession('${s.id}')">
        <div class="session-dot"></div>
        <div class="session-item-info">
          <div class="session-item-time">${s.time}</div>
          <div class="session-item-title">${s.title}</div>
          <div class="session-item-room">${s.speaker.split('／')[0]}</div>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  // Export button
  html += `<div style="padding:16px;">
    <button class="btn btn-outline" style="width:100%;font-size:11px;" onclick="openExport()">
      📋 匯出所有摘要
    </button>
  </div>`;

  sidebar.innerHTML = html;
}

function selectSession(id) {
  const all = Object.values(SESSIONS).flat();
  currentSession = all.find(s => s.id === id);
  renderSidebar();
  renderContent();
}

function formatSummary(text) {
  // Parse the AI output into sections
  const lines = text.split('\n').filter(l => l.trim());
  let html = '';
  let currentSection = null;
  let buffer = [];

  function flushBuffer() {
    if (!buffer.length) return;
    if (currentSection) {
      html += `<div class="summary-section"><h4>${currentSection}</h4>`;
      if (buffer.length === 1) {
        html += `<p>${buffer[0]}</p>`;
      } else {
        html += '<ul>' + buffer.map(b => `<li>${b}</li>`).join('') + '</ul>';
      }
      html += '</div>';
    } else {
      html += `<p style="margin-bottom:12px;">${buffer.join('<br>')}</p>`;
    }
    buffer = [];
  }

  lines.forEach(line => {
    if (line.startsWith('##') || line.startsWith('**') || line.match(/^[一二三四五六七八九十]+[、.]/)) {
      flushBuffer();
      currentSection = line.replace(/^#+\s*/, '').replace(/\*\*/g, '').replace(/：$/, '');
    } else if (line.startsWith('•') || line.startsWith('-') || line.startsWith('·')) {
      buffer.push(line.replace(/^[•\-·]\s*/, ''));
    } else {
      buffer.push(line);
    }
  });
  flushBuffer();
  return html || `<p>${text}</p>`;
}

async function generateSummary() {
  const noteText = document.getElementById('noteInput').value.trim();
  if (!noteText) {
    showToast('請先輸入演講內容或筆記', 'error');
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span> AI 分析中...';

  const output = document.getElementById('summaryOutput');
  output.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted);">
    <div class="loading-dots" style="justify-content:center;margin-bottom:12px;"><span></span><span></span><span></span></div>
    <div style="font-size:13px;">AI 正在整理精華摘要…</div>
  </div>`;

  const s = currentSession;
  const prompt = `你是一位專業的論壇記者與商業分析師，正在整理「AI創新百強趨勢年會」的演講摘要。

【議程資訊】
時間：${s.time}
議題：${s.title}
講者：${s.speaker}

【演講內容／筆記】
${noteText}

請整理一份結構清晰、內容精準的演講摘要，格式如下：

## 核心觀點
（2-3句話概括本場演講最重要的核心主張）

## 關鍵洞察
（條列3-5個最有價值的具體洞察或數據）

## 實戰策略
（條列講者分享的具體做法、工具或方法論）

## 金句摘錄
（1-2句最具代表性、值得引用的話）

## 行動建議
（聽眾可以立即應用的1-3個具體行動）

請用繁體中文撰寫，語言精練有力，避免冗言，每個要點以「•」開頭。`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || '';

    summaries[s.id] = text;
    notes[s.id] = noteText;
    saveData();

    output.innerHTML = formatSummary(text);
    renderSidebar();
    showToast('✓ 摘要生成完成並已儲存', 'success');

    // Re-render to show action buttons
    renderContent();
    document.getElementById('noteInput').value = noteText;

  } catch(e) {
    output.innerHTML = `<div style="color:var(--accent);padding:20px;">生成失敗，請稍後再試。</div>`;
    showToast('生成失敗，請重試', 'error');
  }

  if (btn) {
    btn.disabled = false;
    btn.innerHTML = '✨ AI 生成摘要';
  }
}

}

function openExport() {

  if (!done.length) {
    showToast('尚無任何已完成的摘要', 'error');
    return;
  }

  let text = `AI創新百強趨勢年會 — 摘要彙整\n${'='.repeat(50)}\n生成時間：${new Date().toLocaleString('zh-TW')}\n共 ${done.length} 場\n\n`;
  
  [1, 2].forEach(day => {
    const daySessions = SESSIONS[day].filter(s => summaries[s.id]);
    if (!daySessions.length) return;
    text += `\n${'─'.repeat(50)}\nDAY ${day} — 4/2${day === 1 ? 2 : 3}\n${'─'.repeat(50)}\n`;
    daySessions.forEach(s => {
      text += `\n【${s.time}】${s.title}\n講者：${s.speaker}\n\n${summaries[s.id]}\n`;
    });
  });

  document.getElementById('exportContent').textContent = text;
  document.getElementById('exportModal').classList.add('open');
}

  navigator.clipboard.writeText(text).then(() => showToast('已複製全文', 'success'));
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}


// ── Speech Recognition ──────────────────────────────────────────
let recognition = null;
let isRecording = false;
let recTimerInterval = null;
let recSeconds = 0;
let finalTranscript = '';

function getSpeechLang() {
  const sel = document.getElementById('langSelect');
  return sel ? sel.value : 'zh-TW';
}

function toggleRecording() {
  if (isRecording) stopRecording();
  else startRecording();
}

function startRecording() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('您的瀏覽器不支援語音辨識，請改用 Chrome', 'error');
    return;
  }
  finalTranscript = document.getElementById('noteInput')?.value || '';
  recognition = new SpeechRecognition();
  recognition.lang = getSpeechLang();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => { isRecording = true; updateRecUI(true); startTimer(); };

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalTranscript += t;
      else interim = t;
    }
    const ta = document.getElementById('noteInput');
    if (ta) {
      ta.value = finalTranscript + interim;
      if (currentSession) { notes[currentSession.id] = finalTranscript; saveData(); }
      ta.scrollTop = ta.scrollHeight;
    }
    const status = document.getElementById('recStatus');
    if (status) {
      const wave = '<span class="wave-bars"><span></span><span></span><span></span><span></span><span></span></span>';
      if (interim) {
        const preview = interim.slice(0, 40) + (interim.length > 40 ? '…' : '');
        status.innerHTML = wave + ' <span style="color:#aaa;font-style:italic;">' + preview + '</span>';
      } else {
        status.innerHTML = wave + ' 辨識中…';
      }
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return;
    if (e.error === 'not-allowed') { showToast('請允許麥克風存取權限', 'error'); stopRecording(); return; }
  };

  recognition.onend = () => {
    if (isRecording) { try { recognition.start(); } catch(err) {} }
  };

  try { recognition.start(); }
  catch(err) { showToast('無法啟動麥克風，請重試', 'error'); }
}

function stopRecording() {
  isRecording = false;
  if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
  stopTimer();
  updateRecUI(false);
  const ta = document.getElementById('noteInput');
  if (ta) ta.value = finalTranscript;
  if (currentSession) { notes[currentSession.id] = finalTranscript; saveData(); }
  showToast('錄音已停止，文字已儲存', 'success');
}

function updateRecUI(recording) {
  const btn = document.getElementById('recStartBtn');
  const status = document.getElementById('recStatus');
  const timer = document.getElementById('recTimer');
  if (!btn) return;
  const wave = '<span class="wave-bars"><span></span><span></span><span></span><span></span><span></span></span>';
  if (recording) {
    btn.innerHTML = '<span class="rec-dot"></span> 停止錄音';
    btn.classList.add('recording');
    if (status) { status.className = 'rec-status live'; status.innerHTML = wave + ' 錄音中…'; }
    if (timer) timer.style.display = 'inline';
  } else {
    btn.innerHTML = '<span class="rec-dot"></span> 開始錄音';
    btn.classList.remove('recording');
    if (status) { status.className = 'rec-status'; status.textContent = '按下開始錄音，即時轉文字'; }
    if (timer) timer.style.display = 'none';
  }
}

function startTimer() {
  recSeconds = 0;
  recTimerInterval = setInterval(() => {
    recSeconds++;
    const m = String(Math.floor(recSeconds/60)).padStart(2,'0');
    const s = String(recSeconds%60).padStart(2,'0');
    const el = document.getElementById('recTimer');
    if (el) el.textContent = m + ':' + s;
  }, 1000);
}
function stopTimer() { clearInterval(recTimerInterval); recTimerInterval = null; recSeconds = 0; }

function clearTranscript() {
  if (isRecording) stopRecording();
  finalTranscript = '';
  const ta = document.getElementById('noteInput');
  if (ta) ta.value = '';
  if (currentSession) { notes[currentSession.id] = ''; saveData(); }
  showToast('已清除文字', 'success');
}

function selectSession(id) {
  if (isRecording) stopRecording();
  finalTranscript = '';
  const all = Object.values(SESSIONS).flat();
  currentSession = all.find(s => s.id === id);
  renderSidebar();
  renderContent();
}

// Init
renderSidebar();
updateStats();
</script>
