.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 2s infinite;}

.stat{padding:0 20px;border-right:1px solid rgba(255,255,255,.1);}

.stat-num{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent2);display:block;line-height:1;}
.stat-label{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;font-family:'DM Mono',monospace;}
.header-nav{display:flex;background:#1a1917;border-top:1px solid #333;}

.session-item:hover{background:rgba(0,0,0,.05);}
.session-item.active{background:var(--paper);border-left-color:var(--accent);}
.session-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;margin-top:5px;}

footer{background:var(--ink);color:rgba(255,255,255,.35);text-align:center;padding:16px;font-size:10px;font-family:'DM Mono',monospace;}

summaryData['d1-03'] = '【簡立峰：評審觀點｜從加法到乘法，CEO的AI領導力】\n\n一、 全台AI焦慮蔓延與軟體產業的典範轉移\n簡立峰首先說明，他每天收到約30封演講邀請，主題幾乎都是「如何導入AI」，反映出全台灣企業瀰漫著深度的「AI焦慮」。他指出，AI已強大到某種程度上「殺死」了軟體產業，因為AI現在能透過自己寫程式來解決問題，這是一次真正的典範轉移。他說明，台灣因為過去軟體應用本來就不如美國普及，初期感受到的衝擊相對較小，但這也讓台灣無法感受到那種震驚；美國軟體業受到的衝擊則非常巨大且恐怖，「只要寫軟體的都嚇壞了」。\n\n二、 舊有Legacy系統的致命困境\n簡立峰提到一個流傳的說法：「過去兩年寫的程式碼，如果重寫一次大概兩週就完成，但如果用AI去修改那兩年的舊程式，反而要花兩年。」他強調，這代表新創企業比舊有企業更容易轉型，因為舊企業有龐大的legacy系統拖累，包括Microsoft、Salesforce等大型軟體公司自身也面臨同樣困境，現在微軟已經成為瓶頸，追不上新創的速度。\n\n三、 AI Coding Agent崛起：直接打破各行各業的護城河\n簡立峰特別強調，開發工具在近期發生了重大躍進，從AI Coder進化到「AI Coding Agent」，這兩者是截然不同的概念。他說明，Coder是讓工程師效率提高，但Coding Agent是讓寫程式這件事情本身自動化，等於用可電腦化的工具直接解決各行各業不同程度的自動化問題，甚至可以寫程式去解數學題，完全不需要經過數學理解。他進一步指出，這把各行業龐大的護城河與專業人員直接打破，有些行業的自動化程度可能達到30%，有些可能高達80%；未來的軟體將是「給AI用的」，原有的UX設計與軟體介面都不再需要，銀行業只有一大堆會翻譯程式碼的人，因此傻眼了。\n\n四、 金融業的AI轉型困境與全球資本撤出軟體股\n簡立峰表示，他當天早上才在協助玉山金控開策略會議，玉山走得很快，但因為清楚知道國際趨勢，反而更深刻感受到自己走得有多慢，最主要原因就是「程式改不動」。他指出，銀行的態度是「知道，但不能急」，因為受限於法規與安全考量，無法像新創公司那樣敏捷。他提到，MasterCard已在新加坡與新展銀行實驗AI Agent採購，等於讓信用卡直接成為電商平台；玉山董事長也提到，全球私募股權基金正大舉退出軟體股，金額高達兩兆美元，「軟體業把自己殺死了」。\n\n五、 台灣AI人才嚴重短缺的結構性危機\n簡立峰直言，台灣目前最大的問題是「沒有人」，準確說是沒有人才。他估算，台灣的AI人才與網路時代相比大概只有十分之一，因為2000年網路時代出生人口約40萬，現在AI時代相對應的年輕世代出生人口已降至十幾萬，本來就只剩三分之一；再加上頂尖人才因重視GPA與兵役問題高中就出國，台灣的寶貝現象讓20幾歲的孩子沒有壓力，以及精英人才不去open source community磨練等因素疊加，「一來一往之後真的沒有人了」。他估計一年台灣能培養的AI人才只有幾百位，百大企業一人一個就沒了；他強調「沒有前1%都不算AI人才」，因為在軟體這個領域，沒有排在最前面的人活不下去。\n\n六、 中國的絕對優勢與台灣「出海找人才」的潛台詞\n簡立峰指出，中國擁有全球80%的AI人才，今年畢業大學生高達1,350萬人，在過去二十年裡中國大學畢業生佔全球總數很可能已經過半；加上中央集權式的政策推動，「如果要你養DeepSeek，大家同時就養」，國家的進步速度也對等地快。他說，產業AI化這件事十之八九都在中國大陸發生，因為那裡有足夠多的人才可以開發應用、有場景可以落地實驗。他也透露，他對外講「台灣企業出海」，其實暗示是出海去找中國人，因為島上人才進不來；台積電就是如此，台灣年輕人40歲以下幾乎沒有人去越南工作，工廠能運作靠的都是陸幹。\n\n七、 給台灣企業的AI導入策略：篩選而非全員導入\n簡立峰提出，他在玉山策略會議上分享的核心觀念是「不是導入，是篩選」。他說明，現在企業導入AI的常見做法是讓所有員工都具備AI技能，這有一定效果但效益有限，因為很多員工在工作上還沒有感受到AI，缺乏動機，強迫轉型動力不足。他建議企業應把專注力放在篩選出1%到5%學習能力強、高敏捷的員工，讓他們專注在企業最核心的業務轉型，而不是把AI用在邊緣的客服或行銷上；以李長榮集團為例，它是特用化學公司，最重要的是化學配方，就應該用AI來幫助找出最好的配方。\n\n八、 Work Faster vs. Work Smarter：台灣企業的現階段定位\n簡立峰表示，他在4月22日的年會演講將聚焦在這個核心框架：台灣企業目前普遍還停留在「Work Faster」階段，也就是用AI讓工作效率提升，但還沒有來到「Work Smarter」，也就是用AI驅動決策與深度智慧。他說明，美國已經來到Work Smarter的階段，接下來發生了什麼事值得台灣企業知道。他表示10分鐘演講前三分鐘會update最新AI發展狀況，中間說明Smarter比Faster重要的邏輯，最後給台灣企業三個具體建議，涵蓋「解決人才問題才能解決一切」、「重新來過比修改legacy好」以及「篩選而非全員導入」。\n\n九、 AI時代勝出的個人性格：完美主義者才能打造超人\n簡立峰深刻指出，AI時代真正的Survivor，性格決定一切。他說，好奇心與主動學習能力是前提，但光有這些還不夠；關鍵在於是否是「完美主義者、吹毛求疵的人」。他解釋，多數人用AI達到80分就滿足了，但完美主義者會不斷要求AI，逼出別人逼不出來的驚人結果，把自己打造成超人；而且AI不會討厭你，可以一直被你訓練，這是過去完美主義者逼迫別人被討厭的困境徹底解放了。他也回顧2014年第一次接受採訪時給過的建議，「大數據時代最重要的是好奇心與提問能力」，過了13年到了AI時代，他的答案還是一樣，只是難度更高了。\n\n十、 AI問答vs. Agent：兩者並行而非替代\n簡立峰回應提問，說明AI問答與AI Agent是完全不同的概念，不是誰取代誰。他指出，問答是「請AI給你智慧」，Agent是「給你效率、讓你把一件事完成」；那些說「還在用問答就已經落伍」的說法，是比較看重效率、看短線的觀點。他強調，如果重視AI可以做的創造創新、深度思考、提升知識能力，問答永遠可以問；尤其用AI做research，以前學習緩慢，現在可以用Agent方式讓AI驚人地自動學習，玉山策略會議上的所有問題交給AI回答，都比他自己回答得好，「那就不需要我來回答了」。\n\n十一、 程式設計師的兩條出路與人才的「寬度」要求\n簡立峰說明，純粹的程式設計師將在地球上消失，因為「把人家的concept翻譯成可執行程式碼」這個能力，AI太強了。他指出，工程師接下來只有兩條出路：一是提升成QA Leader，管理品質；二是提升成PM／Product Leader，管理產品定義。他進一步延伸，這個邏輯也適用於媒體與內容產業，寫程式和文字創作在邏輯上其實是接近的，都是用不同形式在表達；有品位、有判斷力的資深人才，加上AI工具，就變成絕對優勢。\n\n十二、 教育體系的全面瓦解與歷史上最嚴重的M型化\n簡立峰示警，傳統標準化的學校教育將會完全瓦解。他說，AI時代的新思維目前還只在極少數人身上發生，但家長終究會投票，孩子就不會走體制內教育。他舉例，一個三歲拿手機的小孩到六歲，可以請AI作畫、請AI做各種事，傳統的才藝老師已經教不了他了。他說，「現在一個小孩擁有的AI參謀比總統還多」，父母面對的無形焦慮感極大；這是歷史上最嚴重的M型化，落差是斷崖式的，能做的只是減少一點點，最終結果就是落差很大，「最後解決辦法是人口減少」。\n\n十三、 今年下半年的關鍵觀察：安全版Coding Agent的落地\n簡立峰表示，今年最重要的事情大概就是Coding Agent，因為Coding Agent解決百業問題的方式，等於跳過對單一能力的不斷訓練，直接用寫程式去解決。他提到，Gemini 3.1的邏輯推理能力已贏過全人類，再加上自己寫程式解決問題，Google已說它可以解決所有PhD level的任務。他預測，今年下半年最重要的觀察點是：中國的DeepSeek一團混亂之後，美國雲端大廠（微軟、Google）推出安全可信賴的Coding Agent工具；到時候台灣企業只要做技能學習就好，門檻大幅下滑，「不用三個月，各種應用就會大量冒出來」。\n\n十四、 年會演講定調與活動行程協調\n簡立峰確認4月22日演講的架構，說明他偏好在演講前一刻才最終確定內容，因為能扣住當下最新的AI發展，讓大家感受更強烈；以現在的節奏，三週後又可能有新的重大事件發生。雙方也就當天行程進行協調，簡立峰表示他從宜蘭來、下午有兩個董事會，在現場停留到中午已是極限，不希望有兩小時空檔浪費時間；他可以在9點20分抵達南港展覽館二館七樓，至於簽書安排，他希望主辦方研究是否能調整到演講結束後立即進行，避免讓他在現場等待過長，「我一天有幾十個行程要安排」。他最後表示，近幾個月行程極度滿檔，不是因為離開Google，而是因為全社會的AI焦慮感找到出口，從副總統、行政院到所有上市公司老闆都來找他，「我現在只是幫忙做AI翻譯而已」。';

function getRoomName(room, day) {
  var names = {
    main: '主論壇',
    E: 'ROOM E — ' + (day === 1 ? '製造/研發/人才' : '資通訊/建築/策略'),
    F: 'ROOM F — ' + (day === 1 ? '服務/零售/行銷' : '服務/醫藥/人才'),
    G: 'ROOM G — ' + (day === 1 ? '金融/財管/人才' : '新創')
  };
  return names[room] || room;
}

function updateStats() {
  var total = SESSIONS[1].length + SESSIONS[2].length;
  var done = Object.keys(summaryData).length;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('pctCount').textContent = Math.round(done / total * 100) + '%';
}

function switchDay(day) {
  currentDay = day;
  currentSession = null;
  var tabs = document.querySelectorAll('.nav-tab');
  tabs[0].classList.toggle('active', day === 1);
  tabs[1].classList.toggle('active', day === 2);
  renderSidebar();
  renderContent();
}

function renderSidebar() {
  var sessions = SESSIONS[currentDay];
  var groups = {};
  sessions.forEach(function(s) {
    if (!groups[s.room]) groups[s.room] = [];
    groups[s.room].push(s);
  });

  var html = '';
  ['main','E','F','G'].forEach(function(room) {
    if (!groups[room]) return;
    html += '<div class="sidebar-section">';
    html += '<div class="sidebar-section-title">' + getRoomName(room, currentDay) + '</div>';
    groups[room].forEach(function(s) {
      var active = currentSession && currentSession.id === s.id;
      var done = !!summaryData[s.id];
      html += '<div class="session-item' + (active ? ' active' : '') + (done ? ' done' : '') + '"';
      html += ' data-id="' + s.id + '" style="cursor:pointer">';
      html += '<div class="session-dot"></div>';
      html += '<div class="session-item-info">';
      html += '<div class="session-item-time">' + s.time + '</div>';
      html += '<div class="session-item-title">' + s.title + '</div>';
      html += '<div class="session-item-spk">' + s.speaker.split('／')[0] + '</div>';
      html += '</div></div>';
    });
    html += '</div>';
  });

  document.getElementById('sidebar').innerHTML = html;

  // Attach click handlers after rendering
  document.querySelectorAll('.session-item[data-id]').forEach(function(el) {
    el.addEventListener('click', function() {
      selectSession(this.getAttribute('data-id'));
    });
  });
}

function selectSession(id) {
  var all = SESSIONS[1].concat(SESSIONS[2]);
  currentSession = null;
  for (var i = 0; i < all.length; i++) {
    if (all[i].id === id) { currentSession = all[i]; break; }
  }
  renderSidebar();
  renderContent();
  document.querySelector('.content').scrollTop = 0;
}

function formatSummary(text) {
  var lines = text.split('\n');
  var html = '';
  var sec = null;
  var buf = [];

  function flush() {
    if (!buf.length) return;
    var content = buf.join('<br>');
    if (sec) {
      html += '<div class="sum-sec"><h4>' + sec + '</h4><p class="summary-text">' + content + '</p></div>';
    } else {
      html += '<p class="summary-text" style="margin-bottom:14px">' + content + '</p>';
    }
    buf = [];
    sec = null;
  }

  lines.forEach(function(l) {
    var clean = l.replace(/\*\*/g, '').trim();
    if (!clean) return;
    if (/^[一二三四五六七八九十]+[、.]/.test(clean)) {
      flush();
      sec = clean.replace(/^[一二三四五六七八九十]+[、.]\s*/, '');
    } else if (clean.indexOf('##') === 0) {
      flush();
      sec = clean.replace(/^#+\s*/, '');
    } else {
      buf.push(clean);
    }
  });
  flush();
  return html || '<p class="summary-text">' + text + '</p>';
}

function renderContent() {
  var area = document.getElementById('contentArea');
  if (!currentSession) {
    area.innerHTML = '<div class="welcome-state"><div class="welcome-icon">🎤</div><div class="welcome-title">選擇左側議程查看精華摘要</div><div class="welcome-desc">每場演講結束後摘要將即時發布<br>點選左側任一場次即可閱讀</div></div>';
    return;
  }

  var s = currentSession;
  var ri = roomInfo[s.room];
  var track = s.track || '主論壇';
  var hasSummary = !!summaryData[s.id];
  var hasSlide = !!slideData[s.id];

  var speakerParts = s.speaker.split('／');
  var speakerName = speakerParts[0];
  var speakerRole = speakerParts.length > 1 ? '／' + speakerParts.slice(1).join('／') : '';

  // Slide box
  var slideHtml = '';
  if (hasSlide) {
    slideHtml = '<div class="slide-box">'
      + '<div class="slide-box-info"><div class="slide-icon">📊</div>'
      + '<div><div class="slide-label">講師簡報下載</div>'
      + '<div class="slide-sub">點擊下載本場簡報檔案</div></div></div>'
      + '<a href="' + slideData[s.id] + '" target="_blank" class="btn-dl">⬇ 下載簡報</a>'
      + '</div>';
  } else {
    slideHtml = '<div class="slide-box no-slide">'
      + '<div class="slide-box-info"><div class="slide-icon">📋</div>'
      + '<div><div class="slide-label">講者未提供本議程簡報</div></div></div>'
      + '</div>';
  }

  // Summary box
  var summaryHtml = '';
  if (hasSummary) {
    summaryHtml = '<div class="summary-box">'
      + '<div class="summary-title">AI 精華筆記</div>'
      + formatSummary(summaryData[s.id])
      + '</div>';
  } else {
    summaryHtml = '<div class="summary-box">'
      + '<div class="pending-box">'
      + '<div class="pending-icon">⏳</div>'
      + '<div class="pending-title">AI精華筆記準備中</div>'
      + '<div class="pending-desc"></div>'
      + '</div></div>';
  }

  area.innerHTML = '<div class="detail-header">'
    + '<div class="detail-time-row">'
    + '<span class="time-badge">' + s.time + '</span>'
    + '<span class="room-badge" style="background:' + ri.color + ';color:' + ri.text + '">' + track + '</span>'
    + (hasSummary ? '<span class="status-done">✓ 精華筆記已發布</span>' : '<span class="status-pending">精華筆記準備中</span>')
    + '</div>'
    + '<div class="detail-title">' + s.title + '</div>'
    + '<div class="detail-speaker">🎤 <strong>' + speakerName + '</strong>' + speakerRole + '</div>'
    + '</div>'
    + slideHtml
    + summaryHtml;
}

async function loadSummaries() {
  try {
    var res = await fetch(SUMMARIES_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('no data');
    var data = await res.json();
    summaryData = {};
    slideData = {};
    // Reset then populate from GitHub
    (data.sessions || []).forEach(function(s) {
      if (s.summary) summaryData[s.id] = s.summary;
      if (s.slide_url) slideData[s.id] = s.slide_url;
    });
    if (data.generated) {
      var d = new Date(data.generated);
      document.getElementById('updateTime').textContent = d.toLocaleString('zh-TW', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    }
  } catch(e) {
    // fetch failed - keep existing data (demo or previous load)
  }
  renderSidebar();
  renderContent();
  updateStats();
}

// Init - 立即渲染側欄與預設選中第一場，不等待資料載入
renderSidebar();
selectSession('d1-01');
loadSummaries();
