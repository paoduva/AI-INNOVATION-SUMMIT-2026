<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI創新百強趨勢年會｜精華摘要</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Sora:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --ink:#0f0e0c;--paper:#f5f2eb;--paper2:#ede9df;
  --accent:#c8401f;--accent2:#e8823a;--muted:#7a746a;
  --border:#d4cfc4;--success:#2d7a4f;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Sora','Noto Serif TC',sans-serif;min-height:100vh;}

/* ── Header ── */
.site-header{background:var(--ink);color:var(--paper);}
.header-top{display:flex;align-items:center;gap:16px;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.1);}
.header-logo{width:90px;height:90px;object-fit:cover;border-radius:6px;flex-shrink:0;}
.header-text{flex:1;}
.header-brand{font-size:10px;font-family:'DM Mono',monospace;color:rgba(255,255,255,.4);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px;}
.header-title{font-family:'Noto Serif TC',serif;font-size:20px;font-weight:900;margin-bottom:4px;}
.header-title span{color:var(--accent2);}
.header-meta{font-size:11px;color:rgba(255,255,255,.45);font-family:'DM Mono',monospace;}
.header-meta span{color:var(--accent2);}

/* DAY 切換 */






/* ── Main layout ── */
.main{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 114px);min-width:700px;}

/* ── Sidebar ── */
.sidebar{background:var(--paper2);border-right:2px solid var(--border);display:flex;flex-direction:column;max-height:calc(100vh - 114px);position:sticky;top:114px;overflow:hidden;}
.sidebar-day-tabs{display:flex;flex-shrink:0;border-bottom:2px solid var(--border);background:var(--paper2);}
.sidebar-list{flex:1;overflow-y:auto;}
.sidebar-day-btn{flex:1;padding:9px 8px;cursor:pointer;font-size:14px;font-weight:700;text-align:center;border:none;background:transparent;color:var(--muted);transition:all .2s;font-family:'DM Mono',monospace;letter-spacing:.08em;border-bottom:3px solid transparent;position:relative;}
.sidebar-day-btn:hover{color:var(--ink);}
.sidebar-day-btn.active.day1{color:var(--accent2);border-bottom-color:var(--accent2);}
.sidebar-day-btn.active.day2{color:var(--accent2);border-bottom-color:var(--accent2);}
.sidebar-section{border-bottom:1px solid var(--border);}
.sidebar-section-title{font-size:12px;font-weight:700;letter-spacing:.15em;color:var(--muted);padding:8px 14px 4px;text-transform:uppercase;font-family:'DM Mono',monospace;}
.session-item{display:flex;align-items:flex-start;gap:8px;padding:8px 14px;cursor:pointer;transition:background .15s;border-left:3px solid transparent;}
.session-item:hover{background:rgba(0,0,0,.05);}
.session-item.active{background:var(--paper);border-left-color:var(--accent);}
.session-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;margin-top:5px;}
.session-item.done .session-dot{background:var(--success);}
.session-item-info{flex:1;min-width:0;}
.session-item-time{font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);}
.session-item-title{font-size:12px;font-weight:600;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.session-item-spk{font-size:12px;color:var(--muted);}

/* ── Content ── */
.content{overflow-y:auto;max-height:calc(100vh - 114px);}
.content-inner{padding:24px 28px;}
.welcome-state{text-align:center;padding:80px 40px;color:var(--muted);}
.welcome-icon{font-size:56px;opacity:.25;margin-bottom:20px;}
.welcome-title{font-size:18px;font-weight:700;color:var(--ink);opacity:.4;margin-bottom:8px;font-family:'Noto Serif TC',serif;}
.welcome-desc{font-size:13px;line-height:1.8;}

/* ── Detail ── */
.detail-header{margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--border);}
.detail-time-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.time-badge{font-family:'DM Mono',monospace;font-size:10px;background:var(--ink);color:var(--paper);padding:3px 9px;border-radius:3px;}
.room-badge{font-size:9px;padding:3px 9px;border-radius:3px;font-weight:600;font-family:'DM Mono',monospace;}
.status-done{font-size:10px;background:rgba(45,122,79,.12);color:var(--success);padding:3px 9px;border-radius:3px;font-weight:600;}
.status-pending{font-size:10px;background:var(--paper2);color:var(--muted);padding:3px 9px;border-radius:3px;}
.detail-title{font-family:'Noto Serif TC',serif;font-size:24px;font-weight:900;line-height:1.4;margin-bottom:8px;}
.detail-speaker{font-size:15px;color:var(--muted);}
.detail-speaker strong{color:var(--ink);}

/* ── Slide ── */
.slide-box{background:white;border:1.5px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.slide-box-info{display:flex;align-items:center;gap:10px;}
.slide-icon{font-size:22px;}
.slide-label{font-size:14px;font-weight:600;color:var(--ink);}
.slide-sub{font-size:13px;color:var(--muted);}
.btn-dl{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:700;background:var(--accent);color:white;text-decoration:none;transition:opacity .2s;white-space:nowrap;}
.btn-dl:hover{opacity:.85;}
.no-slide{background:var(--paper2);border:1.5px dashed var(--border);}
.no-slide .slide-label{color:var(--muted);font-weight:400;font-style:italic;}

/* ── Summary ── */
.summary-box{background:white;border:1.5px solid var(--border);border-radius:8px;padding:22px 24px;}
.summary-title{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-family:'DM Mono',monospace;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.summary-title::after{content:'';flex:1;height:1px;background:var(--border);}
.summary-text{font-size:15.5px;line-height:1.9;color:var(--ink);}
.sum-sec{margin-bottom:18px;}
.sum-sec h4{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px;font-family:'Noto Serif TC',serif;}
.pending-box{text-align:center;padding:48px 20px;color:var(--muted);}
.pending-icon{font-size:36px;opacity:.3;margin-bottom:10px;}
.pending-title{font-size:16px;font-weight:600;color:var(--ink);opacity:.4;}

/* ── Footer ── */
footer{background:var(--ink);color:rgba(255,255,255,.35);text-align:center;padding:16px;font-size:10px;font-family:'DM Mono',monospace;}

/* ── RWD 手機版 ≤700px ── */
@media(max-width:700px){
  .main{grid-template-columns:1fr;min-width:unset;min-height:unset;}
  /* Header：logo 縮小 */
  .header-top{padding:10px 14px;gap:10px;}
  .header-logo{width:56px;height:56px;}
  .header-brand{font-size:9px;}
  .header-title{font-size:15px;}
  .header-meta{font-size:10px;}
  /* Sidebar 上下排列 */
  .sidebar{max-height:220px;position:static;border-right:none;border-bottom:2px solid var(--border);overflow:hidden;}
  .sidebar-list{max-height:176px;}
  /* Content */
  .content{max-height:unset;}
  .content-inner{padding:16px;}
  .detail-title{font-size:18px;}
}
</style>

summaryData['d1-03'] = '【簡立峰：評審觀點｜從加法到乘法，CEO的AI領導力】\n\n一、 全台AI焦慮蔓延與軟體產業的典範轉移\n簡立峰首先說明，他每天收到約30封演講邀請，主題幾乎都是「如何導入AI」，反映出全台灣企業瀰漫著深度的「AI焦慮」。他指出，AI已強大到某種程度上「殺死」了軟體產業，因為AI現在能透過自己寫程式來解決問題，這是一次真正的典範轉移。他說明，台灣因為過去軟體應用本來就不如美國普及，初期感受到的衝擊相對較小，但這也讓台灣無法感受到那種震驚；美國軟體業受到的衝擊則非常巨大且恐怖，「只要寫軟體的都嚇壞了」。\n\n二、 舊有Legacy系統的致命困境\n簡立峰提到一個流傳的說法：「過去兩年寫的程式碼，如果重寫一次大概兩週就完成，但如果用AI去修改那兩年的舊程式，反而要花兩年。」他強調，這代表新創企業比舊有企業更容易轉型，因為舊企業有龐大的legacy系統拖累，包括Microsoft、Salesforce等大型軟體公司自身也面臨同樣困境，現在微軟已經成為瓶頸，追不上新創的速度。\n\n三、 AI Coding Agent崛起：直接打破各行各業的護城河\n簡立峰特別強調，開發工具在近期發生了重大躍進，從AI Coder進化到「AI Coding Agent」，這兩者是截然不同的概念。他說明，Coder是讓工程師效率提高，但Coding Agent是讓寫程式這件事情本身自動化，等於用可電腦化的工具直接解決各行各業不同程度的自動化問題，甚至可以寫程式去解數學題，完全不需要經過數學理解。他進一步指出，這把各行業龐大的護城河與專業人員直接打破，有些行業的自動化程度可能達到30%，有些可能高達80%；未來的軟體將是「給AI用的」，原有的UX設計與軟體介面都不再需要，銀行業只有一大堆會翻譯程式碼的人，因此傻眼了。\n\n四、 金融業的AI轉型困境與全球資本撤出軟體股\n簡立峰表示，他當天早上才在協助玉山金控開策略會議，玉山走得很快，但因為清楚知道國際趨勢，反而更深刻感受到自己走得有多慢，最主要原因就是「程式改不動」。他指出，銀行的態度是「知道，但不能急」，因為受限於法規與安全考量，無法像新創公司那樣敏捷。他提到，MasterCard已在新加坡與新展銀行實驗AI Agent採購，等於讓信用卡直接成為電商平台；玉山董事長也提到，全球私募股權基金正大舉退出軟體股，金額高達兩兆美元，「軟體業把自己殺死了」。\n\n五、 台灣AI人才嚴重短缺的結構性危機\n簡立峰直言，台灣目前最大的問題是「沒有人」，準確說是沒有人才。他估算，台灣的AI人才與網路時代相比大概只有十分之一，因為2000年網路時代出生人口約40萬，現在AI時代相對應的年輕世代出生人口已降至十幾萬，本來就只剩三分之一；再加上頂尖人才因重視GPA與兵役問題高中就出國，台灣的寶貝現象讓20幾歲的孩子沒有壓力，以及精英人才不去open source community磨練等因素疊加，「一來一往之後真的沒有人了」。他估計一年台灣能培養的AI人才只有幾百位，百大企業一人一個就沒了；他強調「沒有前1%都不算AI人才」，因為在軟體這個領域，沒有排在最前面的人活不下去。\n\n六、 中國的絕對優勢與台灣「出海找人才」的潛台詞\n簡立峰指出，中國擁有全球80%的AI人才，今年畢業大學生高達1,350萬人，在過去二十年裡中國大學畢業生佔全球總數很可能已經過半；加上中央集權式的政策推動，「如果要你養DeepSeek，大家同時就養」，國家的進步速度也對等地快。他說，產業AI化這件事十之八九都在中國大陸發生，因為那裡有足夠多的人才可以開發應用、有場景可以落地實驗。他也透露，他對外講「台灣企業出海」，其實暗示是出海去找中國人，因為島上人才進不來；台積電就是如此，台灣年輕人40歲以下幾乎沒有人去越南工作，工廠能運作靠的都是陸幹。\n\n七、 給台灣企業的AI導入策略：篩選而非全員導入\n簡立峰提出，他在玉山策略會議上分享的核心觀念是「不是導入，是篩選」。他說明，現在企業導入AI的常見做法是讓所有員工都具備AI技能，這有一定效果但效益有限，因為很多員工在工作上還沒有感受到AI，缺乏動機，強迫轉型動力不足。他建議企業應把專注力放在篩選出1%到5%學習能力強、高敏捷的員工，讓他們專注在企業最核心的業務轉型，而不是把AI用在邊緣的客服或行銷上；以李長榮集團為例，它是特用化學公司，最重要的是化學配方，就應該用AI來幫助找出最好的配方。\n\n八、 Work Faster vs. Work Smarter：台灣企業的現階段定位\n簡立峰表示，他在4月22日的年會演講將聚焦在這個核心框架：台灣企業目前普遍還停留在「Work Faster」階段，也就是用AI讓工作效率提升，但還沒有來到「Work Smarter」，也就是用AI驅動決策與深度智慧。他說明，美國已經來到Work Smarter的階段，接下來發生了什麼事值得台灣企業知道。他表示10分鐘演講前三分鐘會update最新AI發展狀況，中間說明Smarter比Faster重要的邏輯，最後給台灣企業三個具體建議，涵蓋「解決人才問題才能解決一切」、「重新來過比修改legacy好」以及「篩選而非全員導入」。\n\n九、 AI時代勝出的個人性格：完美主義者才能打造超人\n簡立峰深刻指出，AI時代真正的Survivor，性格決定一切。他說，好奇心與主動學習能力是前提，但光有這些還不夠；關鍵在於是否是「完美主義者、吹毛求疵的人」。他解釋，多數人用AI達到80分就滿足了，但完美主義者會不斷要求AI，逼出別人逼不出來的驚人結果，把自己打造成超人；而且AI不會討厭你，可以一直被你訓練，這是過去完美主義者逼迫別人被討厭的困境徹底解放了。他也回顧2014年第一次接受採訪時給過的建議，「大數據時代最重要的是好奇心與提問能力」，過了13年到了AI時代，他的答案還是一樣，只是難度更高了。\n\n十、 AI問答vs. Agent：兩者並行而非替代\n簡立峰回應提問，說明AI問答與AI Agent是完全不同的概念，不是誰取代誰。他指出，問答是「請AI給你智慧」，Agent是「給你效率、讓你把一件事完成」；那些說「還在用問答就已經落伍」的說法，是比較看重效率、看短線的觀點。他強調，如果重視AI可以做的創造創新、深度思考、提升知識能力，問答永遠可以問；尤其用AI做research，以前學習緩慢，現在可以用Agent方式讓AI驚人地自動學習，玉山策略會議上的所有問題交給AI回答，都比他自己回答得好，「那就不需要我來回答了」。\n\n十一、 程式設計師的兩條出路與人才的「寬度」要求\n簡立峰說明，純粹的程式設計師將在地球上消失，因為「把人家的concept翻譯成可執行程式碼」這個能力，AI太強了。他指出，工程師接下來只有兩條出路：一是提升成QA Leader，管理品質；二是提升成PM／Product Leader，管理產品定義。他進一步延伸，這個邏輯也適用於媒體與內容產業，寫程式和文字創作在邏輯上其實是接近的，都是用不同形式在表達；有品位、有判斷力的資深人才，加上AI工具，就變成絕對優勢。\n\n十二、 教育體系的全面瓦解與歷史上最嚴重的M型化\n簡立峰示警，傳統標準化的學校教育將會完全瓦解。他說，AI時代的新思維目前還只在極少數人身上發生，但家長終究會投票，孩子就不會走體制內教育。他舉例，一個三歲拿手機的小孩到六歲，可以請AI作畫、請AI做各種事，傳統的才藝老師已經教不了他了。他說，「現在一個小孩擁有的AI參謀比總統還多」，父母面對的無形焦慮感極大；這是歷史上最嚴重的M型化，落差是斷崖式的，能做的只是減少一點點，最終結果就是落差很大，「最後解決辦法是人口減少」。\n\n十三、 今年下半年的關鍵觀察：安全版Coding Agent的落地\n簡立峰表示，今年最重要的事情大概就是Coding Agent，因為Coding Agent解決百業問題的方式，等於跳過對單一能力的不斷訓練，直接用寫程式去解決。他提到，Gemini 3.1的邏輯推理能力已贏過全人類，再加上自己寫程式解決問題，Google已說它可以解決所有PhD level的任務。他預測，今年下半年最重要的觀察點是：中國的DeepSeek一團混亂之後，美國雲端大廠（微軟、Google）推出安全可信賴的Coding Agent工具；到時候台灣企業只要做技能學習就好，門檻大幅下滑，「不用三個月，各種應用就會大量冒出來」。\n\n十四、 年會演講定調與活動行程協調\n簡立峰確認4月22日演講的架構，說明他偏好在演講前一刻才最終確定內容，因為能扣住當下最新的AI發展，讓大家感受更強烈；以現在的節奏，三週後又可能有新的重大事件發生。雙方也就當天行程進行協調，簡立峰表示他從宜蘭來、下午有兩個董事會，在現場停留到中午已是極限，不希望有兩小時空檔浪費時間；他可以在9點20分抵達南港展覽館二館七樓，至於簽書安排，他希望主辦方研究是否能調整到演講結束後立即進行，避免讓他在現場等待過長，「我一天有幾十個行程要安排」。他最後表示，近幾個月行程極度滿檔，不是因為離開Google，而是因為全社會的AI焦慮感找到出口，從副總統、行政院到所有上市公司老闆都來找他，「我現在只是幫忙做AI翻譯而已」。';

function formatSummary(text) {
  // Remove completion marker line before displaying
  text = text.split('\n').filter(function(l) {
    return l.indexOf('✓ 已涵蓋錄音') === -1;
  }).join('\n');
  var lines = text.split('\n');
  var html = '';
  var sec = null;
  var buf = [];

  function flush() {
    if (!buf.length) return;
    var content = buf.join('<br>');
    if (sec) {
      html += '<div class="sum-sec"><h4>' + sec + '</h4><p class="summary-text">' + content + '</p></div>';
    } else {
      html += '<p class="summary-text" style="margin-bottom:14px">' + content + '</p>';
    }
    buf = [];
    sec = null;
  }

  lines.forEach(function(l) {
    var clean = l.replace(/\*\*/g, '').trim();
    if (!clean) return;
    if (/^[一二三四五六七八九十]+[、.]/.test(clean)) {
      flush();
      sec = clean.replace(/^[一二三四五六七八九十]+[、.]\s*/, '');
    } else if (clean.indexOf('##') === 0) {
      flush();
      sec = clean.replace(/^#+\s*/, '');
    } else {
      buf.push(clean);
    }
  });
  flush();
  return html || '<p class="summary-text">' + text + '</p>';
}

      + '<div class="pending-title">AI精華筆記準備中</div>'
      + '<div class="pending-desc"></div>'
      + '</div></div>';
  }

  area.innerHTML = '<div class="detail-header">'
    + '<div class="detail-time-row">'
    + '<span class="time-badge">' + s.time + '</span>'
    + '<span class="room-badge" style="background:' + ri.color + ';color:' + ri.text + '">' + track + '</span>'
    + (hasSummary ? '<span class="status-done">✓ 精華筆記已發布</span>' : '<span class="status-pending">精華筆記準備中</span>')
    + '</div>'
    + '<div class="detail-title">' + s.title + '</div>'
    + '<div class="detail-speaker">🎤 <strong>' + speakerName + '</strong>' + speakerRole + '</div>'
    + '</div>'
    + slideHtml
    + summaryHtml;
}

async function loadSummaries() {
  try {
    var res = await fetch(SUMMARIES_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('no data');
    var data = await res.json();
    summaryData = {};
    slideData = {};
    // Reset then populate from GitHub
    (data.sessions || []).forEach(function(s) {
      if (s.summary) summaryData[s.id] = s.summary;
      if (s.slide_url) slideData[s.id] = s.slide_url;
    });
    if (data.generated) {
      var d = new Date(data.generated);
      document.getElementById('updateTime').textContent = d.toLocaleString('zh-TW', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    }
  } catch(e) {
    // fetch failed - keep existing data (demo or previous load)
  }
  renderSidebar();
  renderContent();
  updateStats();
}

// Init - 立即渲染側欄與預設選中第一場，不等待資料載入
renderSidebar();
selectSession('d1-01');
loadSummaries();
setInterval(loadSummaries, REFRESH_INTERVAL);
</script>
